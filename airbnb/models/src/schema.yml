models:
 - name: dim_listings_cleansed
   data_tests:
     - minimum_row_count:
         arguments:
           min_rows: 1000
         severity: warn
   columns:
     - name: listing_id
       tests:
         - not_null
         - unique
     - name: host_id
       tests:
         - not_null
         - relationships:
             to: ref('dim_hosts_cleansed')
             field: host_id

     - name: room_type
       tests:
          - accepted_values:
              arguments:
                values: ['Entire home/apt', 'Private room', 'Shared room','Hotel room']
     - name: minimum_nights
       data_type: integer
       tests:
          - positive_values
 - name: dim_hosts_cleansed
   config:
      contract:
          enforced: true
   constraints:
      - type: primary_key
        columns: [host_id]
   columns:
     - name: host_id
       data_type: integer
       constraints:
          - type: primary_key
       tests:
         - not_null
         - unique
     - name: host_name
       data_type: string
       tests:
         - not_null
     - name: is_superhost
       data_type: string
       tests:
          - accepted_values:
              arguments:
                values: ['t', 'f']
     - name: CREATED_AT
       data_type: TIMESTAMP_NTZ
     - name: UPDATED_AT
       data_type: TIMESTAMP_NTZ
 - name: fct_reviews
   columns:
     - name: listing_id
       tests:
         - not_null
     - name: reviewer_name
       tests:
         - not_null
     - name: review_sentiment
       tests:
          - accepted_values:
              arguments:
                values: ['positive', 'neutral', 'negative']